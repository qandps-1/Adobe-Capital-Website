<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Adobe Capital Partners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <nav class="fixed w-full bg-black/95 backdrop-blur z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <img src="acplogo.jpeg" alt="ACP Logo" class="h-12">
            <div class="flex gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-amber-400">HOME</a>
                <a href="about.html" class="hover:text-amber-400">ABOUT</a>
                <a href="team.html" class="hover:text-amber-400">OUR TEAM</a>
                <a href="contact.html" class="hover:text-amber-400">CONTACT US</a>
            </div>
        </div>
    </nav>

    <div class="pt-32 max-w-2xl mx-auto px-8 py-20 text-center">
        <h1 class="heading text-6xl font-bold mb-8">Contact Us</h1>
        <p class="text-xl text-zinc-400 mb-12">Feel free to contact us with any questions or concerns. You can use the form below or email us directly.</p>

        <form class="space-y-6">
            <input type="text" placeholder="Your Name" class="w-full bg-zinc-900 border border-white/30 rounded-2xl px-6 py-4 text-white">
            <input type="email" placeholder="Your Email" class="w-full bg-zinc-900 border border-white/30 rounded-2xl px-6 py-4 text-white">
            <textarea placeholder="Your Message" rows="6" class="w-full bg-zinc-900 border border-white/30 rounded-2xl px-6 py-4 text-white"></textarea>
            <button type="submit" class="w-full bg-amber-400 hover:bg-white text-black font-semibold py-4 rounded-full text-lg">Send Message</button>
        </form>

        <p class="mt-12 text-zinc-400">Phoenix, AZ • robin@adobecapitalpartners.com</p>
    </div>

    <footer class="py-12 text-center text-sm border-t border-white/10 bg-black">
        Adobe Capital Partners • Phoenix, AZ • robin@adobecapitalpartners.com
    </footer>
</body>
</html>
